    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script> 
   <script>
       window.onload = function(){

      let name = localStorage.getItem("name");

      if(!name){
         alert("Please register first");
         window.location="index.html";
         return;
      }

      // fill details
      document.getElementById("name").value=name || "";
      document.getElementById("dob").value=localStorage.getItem("dob")||"";
      document.getElementById("gender").value=localStorage.getItem("gender")||"";
      document.getElementById("address").value=localStorage.getItem("address")||"";
      document.getElementById("pincode").value=localStorage.getItem("pincode")||"";
      document.getElementById("email").value=localStorage.getItem("email")||"";
      document.getElementById("password").value=localStorage.getItem("password")||"";

      alert("Thank you for Registration 🎉");
      };
             
       function a(){
         let email = document.getElementById('t1').value.trim();
         let password = document.getElementById('t2').value.trim();

   if(email=="" || password==""){
       alert("Please fill Email and Password");
       return;
   }

   localStorage.setItem('email',email);
   localStorage.setItem('password',password);
   alert("Login Success 😊");
   document.location='templet3.html';
}
   </script>

    <div class="container-fluid">
        <div class="row">
            <div class="col-lg-5 ms-5">
                <h1 class="text-primary text-center">Login Panel</h1>
                <form>
                  <div class="mb-3">
                     <label class="form-label">Email:</label>
                     <input type="email" id="t1" name="email" required class="form-control">
                   </div>

                   <div class="mb-3">
                     <label class="form-label">Password:</label>
                     <input type="password" id="t2" name="password" pattern=".{4,10}" required class="form-control">
                   </div>
                   </form>

                <div class="mt-3 mb-3 text-center">
                    <button onclick="a()" class=" btn btn-outline-primary  ">Login</button>
                </div>
            </div>
           <div class="col-lg-1 d-flex justify-content-center">
    <div style="border-left: 3px solid #999; height: 100%;"></div>
</div>

            <div class="col-lg-5 ms-5 " id="your Details" >
                 <h1 class="text-primary text-center">Your Details</h1>
                <form id="registerForm">
                   <div class="mb-3">
                     <label class="form-label">Name:</label>
                     <input type="text" id="name" name="name" required class="form-control">
                   </div>

                   <div class="mb-3">
                     <label class="form-label">DOB:</label>
                     <input type="date" name="date" id="dob" required class="form-control">
                   </div>

                   <div class="mb-3">
                     <label class="form-label">Gender:</label>
                     <select id="gender" required class="form-control">
                       <option value="">select</option>
                       <option value="male">male</option>
                       <option value="female">female</option>
                     </select>
                   </div>

                   <div class="mb-3">
                     <label class="form-label">Address:</label>
                     <textarea id="address" name="address" required class="form-control"></textarea>
                   </div>

                   <div class="mb-3">
                     <label class="form-label">Pincode:</label>
                     <input type="number" id="pincode" name="pincode" pattern=".{5,6}" required class="form-control">
                   </div>

                   <div class="mb-3">
                     <label class="form-label">Email:</label>
                     <input type="email" id="email" name="email" required class="form-control">
                   </div>

                   <div class="mb-3">
                     <label class="form-label">Password:</label>
                     <input type="password" id="password" name="password" pattern=".{4,10}" required class="form-control">
                   </div>
                 </form>
