<style>
body {

footer {

form label {

   <script>
     function a(){
           let serviceid=document.getElementById("service_id").value;
           let eventname=document.getElementById("Event_Name").value;
           let date=document.getElementById("Date").value;
           let members = parseFloat(document.getElementById("No_of_Members").value);
           let price = parseFloat(document.getElementById("Price").value);

           //auto calculate total
           let total = members * price;
           
           //calculate  taxes
           let tax = total * 0.02; //2%
           let cgst = total * 0.02;
           let sgst = total * 0.02;
           let grandtotal = total + tax + cgst + sgst;


            document.getElementById("billid").value=serviceid;
            document.getElementById("billtotal").value=total;
            document.getElementById("tax").value=tax.toFixed(2);
            document.getElementById("cgst").value=cgst.toFixed(2);
            document.getElementById("sgst").value=sgst.toFixed(2);
            document.getElementById("grandtotal").value=grandtotal.toFixed(2);

          
            //save all input data
           localStorage.setItem("service_id", serviceid);
           localStorage.setItem("Event_Name", eventname);
           localStorage.setItem("Date", date);
           localStorage.setItem("No_of_Members", members);
           localStorage.setItem("Price", price.toFixed(2));
           localStorage.setItem("Tax", tax.toFixed(2));
           localStorage.setItem("CGST", cgst.toFixed(2));
           localStorage.setItem("SGST", sgst.toFixed(2));
           localStorage.setItem("grandTotal", grandtotal.toFixed(2));

            setTimeout(() => document.location = "templet4.html", 3000);

            let today = new Date().toLocaleDateString();
            document.getElementById("d1").innerText = today;

            let b=setInterval(myclock,1000)
              function myclock()
             {
              let d=new Date()
              document.getElementById('demo').innerHTML=d.toLocaleTimeString()
             }
             }

           
   </script>
</head>
